routes:
#http://localhost:18080/test/hello?status=200
#http://localhost:18080/test/hello?status=200&hello=world
  - match:
      verb: GET
      pattern: test/hello
    response:
      status: "{{queryParams.status}}"
      headers:
        Content-Type: "application/json"
      content: |
        [
          {% for kvp in queryParams %} 
            "{{kvp[0]}}={{kvp[1]}}"{% unless forloop.last %}, {% endunless %}
          {% endfor %}
        ]