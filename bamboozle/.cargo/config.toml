# Dependabot cannot access the sparse crates.io registry (index.crates.io)
# due to infrastructure limitations. This falls back to the git-based index.
# Scoped to bamboozle/ so it does not affect other parts of the repo.
[source.crates-io]
replace-with = "crates-io-git"

[source.crates-io-git]
registry = "https://github.com/rust-lang/crates.io-index"
