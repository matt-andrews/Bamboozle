routes:
  - match:
      verb: GET
      pattern: /secrets/{secretName}
    response:
      status: "200"
      content: |
        {
          "value": "super-secret-password123",
          "id": "https://localhost:8080/secrets/{{ routeValues.secretName }}/4387e9f3d6e14c459867679a90fd0f79",
          "attributes": {
            "enabled": true,
            "created": 1493938410,
            "updated": 1493938410,
            "recoveryLevel": "Recoverable+Purgeable"
          }
        }
      headers:
        Content-Type: application/json

  - match:
      verb: PUT
      pattern: /secrets/{secretName}
    response:
      status: "200"
      content: |
        {
          "value": "{{ body.value }}",
          "id": "https://localhost:8080/secrets/{{ routeValues.secretName }}/4387e9f3d6e14c459867679a90fd0f79",
          "attributes": {
            "enabled": true,
            "created": 1493938410,
            "updated": 1493938410,
            "recoveryLevel": "Recoverable+Purgeable"
          }
        }
      headers:
        Content-Type: application/json
