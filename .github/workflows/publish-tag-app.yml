name: Publish - App

on:
  push:
    tags:
      - "app/v*"

jobs:
  unit-test:
    uses: ./.github/workflows/pr-test-unit.yml
  playwright-test:
    uses: ./.github/workflows/pr-test-playwright.yml
  load-tests:
    uses: ./.github/workflows/main-test-k6.yml
  fault-tolerance-example:
    uses: ./.github/workflows/main-test-example-fault-tolerance.yml
  keyvault-example:
    uses: ./.github/workflows/main-test-example-keyvault.yml

  publish-app:
    needs:
      - unit-test
      - playwright-test
      - load-tests
      - fault-tolerance-example
      - keyvault-example

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#app/}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./bamboozle
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bamboozle:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bamboozle:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/bamboozle
          readme-filepath: ./DOCKER_HUB_README.md
