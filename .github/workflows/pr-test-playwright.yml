name: PR - playwright tests

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "bamboozle/**"
      - "playwright/**"
      - "scripts/**"
      - "sdks/npm/**"
      - ".github/workflows/pr-test-playwright.yml"

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ./sdks/npm/node_modules
            ./playwright/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('sdks/npm/package-lock.json', 'playwright/package-lock.json') }}

      - name: Run compose
        run: docker compose -f ./scripts/docker-compose.dev.yml up -d

      - name: Build npm sdk
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install && npm run build
        working-directory: ./sdks/npm

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('playwright/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
        working-directory: ./playwright

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
        working-directory: ./playwright

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ./playwright

      - name: Publish test report
        uses: ctrf-io/github-test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          report-path: ./playwright/ctrf/ctrf-report.json
          pull-request-report: "true"
          title: "Playwright E2E"

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./playwright/playwright-report/
          retention-days: 30
