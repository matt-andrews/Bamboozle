name: Startup Time

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  startup-time:
    name: Docker Startup Time
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker compose -f ./scripts/docker-compose.dev.yml up -d

      - name: Capture Docker image size
        run: |
          SIZE=$(docker image inspect bamboozle:dev --format='{{.Size}}')
          python3 -c "
          import json; size = int('$SIZE'); orig = size
          for u in ['B', 'KiB', 'MiB', 'GiB']:
              if size < 1024:
                  h = f'{size:.1f} {u}'; break
              size /= 1024
          json.dump({'bytes': orig, 'human': h}, open('docker-size.json', 'w'))
          "

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-size
          path: docker-size.json
          retention-days: 30

      - name: Run startup time test
        run: bash ./scripts/perf-test/test-startup.sh bamboozle:dev 5

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: startup-results
          path: startup-results.json
          retention-days: 30
