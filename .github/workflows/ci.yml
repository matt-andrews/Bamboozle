name: CI

on:
  pull_request:
    types: [opened, synchronize]
  workflow_call:

jobs:
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bamboozle

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Clippy
        run: rustup component add clippy

      - name: Cargo Check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: |
          set -o pipefail
          cargo test 2>&1 | tee cargo-test-output.txt
          python3 - << 'EOF'
          import re, json
          passed = failed = ignored = 0
          with open("cargo-test-output.txt") as f:
              for line in f:
                  m = re.search(r"(\d+) passed; (\d+) failed; (\d+) ignored", line)
                  if m:
                      passed += int(m.group(1)); failed += int(m.group(2)); ignored += int(m.group(3))
          json.dump({"passed": passed, "failed": failed, "ignored": ignored}, open("unit-test-results.json", "w"))
          EOF

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: ./bamboozle/unit-test-results.json
          retention-days: 30

  azure-keyvault-example:
    name: Azure KeyVault Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Run azure-keyvault example
        run: bash examples/azure-keyvault/runme.sh
