name: CI

on:
  pull_request:
    types: [opened, synchronize]
  workflow_call:

env:
  DOTNET_VERSION: '10.x'

jobs:
  dotnet-unit-test:
    name: Dotnet Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}

      - name: Test
        run: dotnet test ./src/Bamboozle.slnx --configuration Release --logger "GitHubActions"
