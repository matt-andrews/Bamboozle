name: PR CI Report

on:
  workflow_run:
    workflows:
      - CI
      - Playwright Tests
      - K6 Load Tests
      - Startup Time
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    # Only fire for PR events; skip pushes to branches (e.g. nightly triggers)
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Prefer the PR number embedded in the workflow_run payload
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' \
            | jq -r '.[0].number // empty')

          # Fallback: search open PRs by head SHA (needed for fork PRs)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api "/repos/$REPO/pulls?state=open&per_page=100" \
              --jq ".[] | select(.head.sha == \"$HEAD_SHA\") | .number" | head -1)
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for SHA $HEAD_SHA — skipping report"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"

      - name: Download CI artifacts
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          mkdir -p artifacts

          download_artifact() {
            local workflow_file="$1" artifact_name="$2" dest_dir="$3"
            local run_id
            run_id=$(gh api "/repos/$REPO/actions/workflows/$workflow_file/runs?per_page=10" \
              --jq ".workflow_runs[]
                    | select(.head_sha == \"$HEAD_SHA\" and .status == \"completed\")
                    | .id" \
              | head -1)

            if [ -n "$run_id" ]; then
              gh run download "$run_id" \
                --repo "$REPO" \
                --name "$artifact_name" \
                --dir "artifacts/$dest_dir" 2>/dev/null \
                && echo "  ✓ $artifact_name" \
                || echo "  ✗ $artifact_name (artifact not found in run $run_id)"
            else
              echo "  ⏳ $artifact_name (no completed run for $HEAD_SHA)"
            fi
          }

          echo "Collecting artifacts for $HEAD_SHA ..."
          download_artifact ci.yml           unit-test-results  unit-tests
          download_artifact playwright.yml   playwright-results playwright
          download_artifact k6.yml           k6-results         k6
          download_artifact startup-time.yml startup-results    startup
          download_artifact startup-time.yml docker-size        docker-size

      - name: Download base-branch unit test artifact (for delta)
        if: steps.pr.outputs.pr_number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          BASE_SHA=$(gh api "/repos/$REPO/pulls/$PR_NUMBER" --jq '.base.sha')
          BASE_RUN_ID=$(gh api "/repos/$REPO/actions/workflows/ci.yml/runs?per_page=20" \
            --jq ".workflow_runs[]
                  | select(.head_sha == \"$BASE_SHA\" and .conclusion == \"success\")
                  | .id" \
            | head -1)

          if [ -n "$BASE_RUN_ID" ]; then
            gh run download "$BASE_RUN_ID" \
              --repo "$REPO" \
              --name unit-test-results \
              --dir artifacts/base-unit-tests 2>/dev/null \
              && echo "Base test artifact downloaded" \
              || echo "Base test artifact not available (skipping delta)"
          else
            echo "No successful base CI run found — delta will be omitted"
          fi

      - name: Generate comment
        if: steps.pr.outputs.pr_number != ''
        env:
          TRIGGERING_WORKFLOW: ${{ github.event.workflow_run.name }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: python3 .github/scripts/generate-report.py

      - name: Post or update PR comment
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          MARKER="<!-- bamboozle-ci-report -->"
          BODY=$(cat comment.md)

          COMMENT_ID=$(gh api "/repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment $COMMENT_ID"
            gh api --method PATCH "/repos/$REPO/issues/comments/$COMMENT_ID" \
              -f body="$BODY"
          else
            echo "Creating new comment on PR #$PR_NUMBER"
            gh api --method POST "/repos/$REPO/issues/$PR_NUMBER/comments" \
              -f body="$BODY"
          fi
