version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "matt-andrews"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/bamboozle"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "matt-andrews"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "docker"
    directory: "/bamboozle"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "matt-andrews"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "npm"
    directory: "/playwright"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "matt-andrews"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "npm"
    directory: "/sdks/npm"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "matt-andrews"
    commit-message:
      prefix: "chore"
